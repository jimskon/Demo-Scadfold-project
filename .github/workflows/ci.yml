name: CIon:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]jobs:
  test:
    runs-on: ubuntu-latest    steps:
      - name: Check out repo
        uses: actions/checkout@v4      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json
            package-lock.json      - name: Install root dependencies
        run: |
          if [ -f package.json ]; then npm install; fi      - name: Install client dependencies
        run: |
          cd client
          npm install      - name: Install server dependencies
        run: |
          cd server
          npm install      - name: Run server tests
        run: |
          cd server
          npm test      - name: Run client tests
        run: |
          cd client
          npm test      - name: Build client
        run: |
          cd client
          npm run build      - name: Run end-to-end smoke test
        run: |
          npx playwright install --with-deps
          npm run test:e2e