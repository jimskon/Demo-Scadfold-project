name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'cdsetup' }}
    runs-on: self-hosted

    steps:
      - name: Deploy on self-hosted runner
        run: |
          cd ~/sd/Demo-Scadfold-project
          ./deploy.sh